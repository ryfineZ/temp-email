name: Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'worker/**'
      - 'frontend/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          version: 10
          run_install: false

      - name: Deploy Backend
        run: |
          cd worker/
          echo "${{ secrets.BACKEND_TOML_BASE64 }}" | base64 -d > wrangler.toml
          cat wrangler.toml
          pnpm install --no-frozen-lockfile
          pnpm run deploy
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          version: 10
          run_install: false

      - name: Deploy Frontend
        run: |
          cd frontend/
          if [ -n "${{ secrets.FRONTEND_ENV }}" ]; then
            echo "${{ secrets.FRONTEND_ENV }}" > .env.prod
          fi
          pnpm install --no-frozen-lockfile
          pnpm run deploy --project-name=${{ secrets.FRONTEND_NAME }}
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
